<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racquet Court Booking System</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <h1>Bookings</h1>
            </div>
        </div>
    </header>

    <div class="header-divider"></div>

    <div class="container">
        <div class="toggle-section">
            <div class="radio-toggle-container">
                <label class="radio-option">
                    <input type="radio" name="bookingFilter" value="all" checked>
                    <span class="radio-dot"></span>
                    <span class="radio-label">All</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="bookingFilter" value="available">
                    <span class="radio-dot"></span>
                    <span class="radio-label">Available</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="bookingFilter" value="booked">
                    <span class="radio-dot"></span>
                    <span class="radio-label">Booked</span>
                </label>
            </div>
        </div>

        <div class="controls-row">
            <div class="court-filter-container">
                <select id="courtFilter" class="court-select">
                    <option value="all">All Courts</option>
                    <option value="padel">Padel</option>
                    <option value="tennis">Tennis</option>
                    <option value="badminton">Badminton</option>
                </select>
            </div>
            <button id="createNew" class="btn btn-primary btn-add-booking" type="button">ADD BOOKING</button>
        </div>

        <main>
            <div class="calendar-controls">
                <button id="calendarPrev" class="btn btn-secondary" type="button">Prev</button>
                <div id="calendarMonthLabel" class="calendar-month-label"></div>
                <button id="calendarNext" class="btn btn-secondary" type="button">Next</button>
            </div>
            <div id="bookingsList" class="bookings-container">
                <!-- Bookings will be dynamically inserted here -->
            </div>

            <div class="download-section download-section--bottom">
                <a href="#" id="downloadWhatsApp" class="download-link">Download Bookings</a>
            </div>
                
                <div id="noBookings" class="no-bookings" style="display: none;">
                    <p>No upcoming bookings found.</p>
                    <p>Click "Create New Event" to add your first booking.</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Booking</h2>
                <span class="close">&times;</span>
            </div>
            <form id="bookingForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courtType">Court Type:</label>
                        <select id="courtType" required>
                            <option value="">Select court type</option>
                            <option value="Padel">Padel</option>
                            <option value="Tennis">Tennis</option>
                            <option value="Badminton">Badminton</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="maxPlayers">Number of Players:</label>
                        <select id="maxPlayers" required>
                            <option value="2">2 Players</option>
                            <option value="4" selected>4 Players</option>
                            <option value="infinite">Unlimited</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="court">Court:</label>
                        <select id="court">
                            <option value="">Select a court</option>
                            <option value="Court 1">Court 1</option>
                            <option value="Court 2">Court 2</option>
                            <option value="Court 3">Court 3</option>
                            <option value="Court 4">Court 4</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="startTime">Start Time:</label>
                        <select id="startTime" required>
                            <option value="">Select start time</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="sessionLength">Session Length:</label>
                        <select id="sessionLength" required>
                            <option value="60">60 minutes</option>
                            <option value="90">90 minutes</option>
                            <option value="120">120 minutes</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="bookedBy">Booked By:</label>
                        <input type="text" id="bookedBy" placeholder="Name">
                    </div>
                    
                    <div class="form-group form-group--wide">
                        <label>Players:</label>
                        <div class="players-input-grid">
                            <input type="text" id="player1" placeholder="Player 1" maxlength="8">
                            <input type="text" id="player2" placeholder="Player 2" maxlength="8">
                            <input type="text" id="player3" placeholder="Player 3" maxlength="8">
                            <input type="text" id="player4" placeholder="Player 4" maxlength="8">
                        </div>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Booking</button>
                </div>
                <div class="form-actions form-actions--delete" id="deleteRow" style="display: none;">
                    <button type="button" id="deleteBookingBtn" class="btn btn-danger">DELETE BOOKING</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
